services:
  # ── RAG / Python Backend ──────────────────────────────────────────────────
  - type: web
    name: legalai-rag
    env: docker
    region: singapore
    plan: free
    rootDir: rag_service
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false           # Set in Render dashboard — never commit the value
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: PORT
        value: "10000"

  # ── Frontend (Vite / React) ───────────────────────────────────────────────
  # Render static sites do NOT inject env vars at build time.
  # Using a Node web service lets us pass VITE_* vars so Vite can bake them
  # into the bundle during `npm run build`, then serve with `serve`.
  - type: web
    name: legalai-frontend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx serve dist -l $PORT
    autoDeploy: true
    envVars:
      # ── RAG backend URL (known static value) ──────────────────────────────
      - key: VITE_RAG_API_BASE_URL
        value: https://legalai-rag-035l.onrender.com

      # ── Groq ─────────────────────────────────────────────────────────────
      - key: VITE_GROQ_API_KEY
        sync: false           # Set in Render dashboard — never commit the value
      - key: VITE_GROQ_MODEL
        value: llama-3.3-70b-versatile

      # ── Firebase ──────────────────────────────────────────────────────────
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_MEASUREMENT_ID
        sync: false
